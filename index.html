<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Suite - Offline ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <div id="login-page" class="login-container">
            <div class="login-box">
                <h1>Business Suite</h1>
                <p class="text-muted mb-4">Offline ERP Management System</p>
                <form id="login-form">
                    <div class="mb-3">
                        <input type="text" class="form-control" id="username" placeholder="Username" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" class="form-control" id="password" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr>
                <p class="text-center text-muted small">Demo: user / 1234</p>
            </div>
        </div>

        <div id="main-app" class="d-none">
            <nav class="navbar navbar-dark bg-dark sticky-top">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h5"><i class="bi bi-shop"></i> Business Suite</span>
                    <div class="d-flex align-items-center gap-3">
                        <span id="user-info" class="text-white-50"></span>
                        <button class="btn btn-outline-light btn-sm" id="logout-btn">
                            <i class="bi bi-box-arrow-right"></i> Logout
                        </button>
                    </div>
                </div>
            </nav>

            <div class="container-fluid">
                <div class="row">
                    <nav class="col-md-2 d-md-block bg-light sidebar collapse" id="sidebar">
                        <div class="position-sticky pt-3">
                            <ul class="nav flex-column">
                                <li class="nav-item">
                                    <a class="nav-link active" href="#" data-page="dashboard">
                                        <i class="bi bi-house-door"></i> Dashboard
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" data-page="pos">
                                        <i class="bi bi-credit-card"></i> POS
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" data-page="inventory">
                                        <i class="bi bi-box"></i> Inventory
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" data-page="customers">
                                        <i class="bi bi-people"></i> Customers
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" data-page="analytics">
                                        <i class="bi bi-bar-chart"></i> Analytics
                                    </a>
                                </li>
                                <li class="nav-item">
                                    <a class="nav-link" href="#" data-page="settings">
                                        <i class="bi bi-gear"></i> Settings
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </nav>

                    <main class="col-md-10 ms-sm-auto px-md-4">
                        <div id="page-content"></div>
                    </main>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
